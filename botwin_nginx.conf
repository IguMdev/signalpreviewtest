server {
    server_name botwin.site www.botwin.site;

    location / {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/botwin.site/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/botwin.site/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    if ($host = www.botwin.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = botwin.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name botwin.site www.botwin.site;
    return 404; # managed by Certbot




}